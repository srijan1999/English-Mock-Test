<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>English Mock Test</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <h1>📘 English Mock Test</h1>

        <p class="subtitle">
            Choose the correct answer for each question.
        </p>
        <p class="made-with">
            <i>Made with</i> ❤️ <i>by Srijan</i> 🐸
        </p>

    </header>


    <section class="top-bar">

        <div class="timer-box">
            ⏳ Time :
            <span id="timer">00:00</span>
        </div>

        <button id="themeBtn" class="theme-btn">
            🌙 Dark Mode
        </button>

    </section>


    <div id="errorMessage" class="error hidden">

    </div>


    <form id="quizForm">

        <!-- Questions will be inserted here -->

        <div id="questionsContainer"></div>

        <div class="submit-area">

            <button
                type="button"
                id="submitBtn"
                class="submit-btn">

                Submit and Evaluate

            </button>

        </div>

    </form>


    <section id="resultBox" class="result hidden">

        <h2>Your Result</h2>

        <p id="scoreText"></p>

        <p id="timeText"></p>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
